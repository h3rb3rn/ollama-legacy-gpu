services:

  # Single instance: all 12 GPU endpoints combined (~114 GB VRAM)
  #
  # GPU 0-3, 6:  5× RTX (2×RTX2060 + 3×RTX3060)  @ 12 GB = 60 GB  sm_7.5/sm_8.6
  # GPU 4-5:     Tesla M60 (1 card, 2 GPU dies)    @  7.68 GB = 15.36 GB  sm_5.2
  # GPU 7-10:    Tesla M10 (1 card, 4 GPU dies)    @  8 GB = 32 GB  sm_5.0
  # GPU 11:      GTX 1060                              6 GB  sm_6.1
  # Total:       ~114 GB VRAM — fits models up to ~80 GB (weights + KV-cache)
  #
  # Image: ghcr.io/h3rb3rn/ollama-legacy (CUDA 12.0.1, CC 50-virtual→90a)
  #   PTX-JIT for Tesla M10/M60 (CC 5.0/5.2) — one-time JIT compilation on first load,
  #   then cached in /opt/ollama/models/cuda-cache.
  #
  # Source: https://github.com/h3rb3rn/ollama-legacy-gpu
  ollama:
    image: ghcr.io/h3rb3rn/ollama-legacy:cuda12-maxwell-latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /opt/ollama/models:/root/.ollama
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - ai-stack-network

networks:
  ai-stack-network:
    driver: bridge
