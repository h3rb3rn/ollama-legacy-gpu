name: Upstream Ollama Release Check

on:
  schedule:
    # Every Monday at 06:17 UTC (off-peak, avoids :00/:30 congestion)
    - cron: '17 6 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Ollama version
        id: upstream
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/ollama/ollama/releases/latest \
            | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Upstream: $VERSION"

      - name: Read last built version
        id: local
        run: |
          LAST=$(cat .last-built-version 2>/dev/null || echo "none")
          echo "last=$LAST" >> $GITHUB_OUTPUT
          echo "Last built: $LAST"

      - name: New version detected — trigger build
        if: steps.upstream.outputs.version != steps.local.outputs.last
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'new-ollama-release',
              client_payload: {
                version: '${{ steps.upstream.outputs.version }}'
              }
            });
            console.log('Build workflow triggered for ${{ steps.upstream.outputs.version }}');

      - name: Update version file
        if: steps.upstream.outputs.version != steps.local.outputs.last
        run: |
          echo "${{ steps.upstream.outputs.version }}" > .last-built-version
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-version
          git commit -m "chore: detected Ollama ${{ steps.upstream.outputs.version }}"
          git push

      - name: Already up to date
        if: steps.upstream.outputs.version == steps.local.outputs.last
        run: echo "Already current (${{ steps.upstream.outputs.version }}) — no build needed."
